<div class="enterprise-sheet-container pb-0">
  <mat-nav-list class="pt-2">
    @for(item of data; track $index){
      <a mat-list-item 
         (click)="openLink($event, item.identifier)" 
         class="enterprise-item mx-2 mb-1 rounded-3">
        
        <div matListItemIcon class="icon-wrapper d-flex align-items-center justify-content-center">
          <mat-icon style="color: #3d5a80;" class="mt-3">
            {{ item.icon }}
          </mat-icon>
        </div>

        <div matListItemTitle class="fw-semibold text-dark">{{ item.title }}</div>
        <div matListItemLine class="text-muted small">{{ item.label }}</div>
      </a>
    }
  </mat-nav-list>
</div>
